<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Nominal vs real GDP">
  <rect width="320" height="200" fill="#f0fdfa"/>
  <text x="160" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#115e59">Real vs nominal</text>
  <rect x="50" y="55" width="90" height="110" rx="8" fill="#99f6e4" stroke="#14b8a6" stroke-width="2"/>
  <text x="95" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#134e4a">Nominal</text>
  <text x="95" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0f766e">current $</text>
  <rect x="65" y="120" width="60" height="35" rx="4" fill="#5eead4"/>
  <rect x="180" y="55" width="90" height="110" rx="8" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>
  <text x="225" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#14532d">Real</text>
  <text x="225" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#166534">constant $</text>
  <rect x="195" y="120" width="60" height="28" rx="4" fill="#34d399"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Strip inflation to compare output</text>
</svg>
