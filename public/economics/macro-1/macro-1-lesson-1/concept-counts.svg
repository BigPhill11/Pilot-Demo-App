<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Green panda teacher showing new goods count in GDP and used goods do not">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#065f46" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="320" height="220" fill="url(#bg)"/>
  <path d="M10 48 C86 16 135 37 193 61 C249 85 285 74 320 48 L320 220 L10 220 Z" fill="#bbf7d0" opacity="0.36"/>
  <ellipse cx="160" cy="207" rx="122" ry="11" fill="#065f46" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="112" y="27" width="184" height="152" rx="16" fill="#2f8f3f"/>
    <rect x="123" y="38" width="162" height="130" rx="10" fill="#fffbeb"/>
    <text x="204" y="61" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#065f46">What Counts?</text>
    <rect x="136" y="75" width="63" height="66" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <rect x="147" y="108" width="42" height="16" rx="5" fill="#059669"/>
    <circle cx="153" cy="126" r="5" fill="#065f46"/>
    <circle cx="183" cy="126" r="5" fill="#065f46"/>
    <text x="168" y="93" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#065f46">New car</text>
    <text x="168" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#16a34a">YES</text>
    <rect x="211" y="75" width="63" height="66" rx="8" fill="#ecfdf5" stroke="#64748b" stroke-width="2"/>
    <rect x="223" y="112" width="39" height="13" rx="4" fill="#94a3b8"/>
    <text x="243" y="93" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#065f46">Used item</text>
    <text x="243" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#64748b">NO</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="70" cy="158" rx="35" ry="45" fill="url(#fur)"/>
    <circle cx="70" cy="88" r="42" fill="#f8fff3"/>
    <circle cx="43" cy="59" r="18" fill="#166534"/>
    <circle cx="97" cy="59" r="18" fill="#166534"/>
    <ellipse cx="55" cy="88" rx="11" ry="16" fill="#065f46" transform="rotate(12 55 88)"/>
    <ellipse cx="85" cy="88" rx="11" ry="16" fill="#065f46" transform="rotate(-12 85 88)"/>
    <circle cx="55" cy="86" r="5" fill="#f0fdf4"/>
    <circle cx="85" cy="86" r="5" fill="#f0fdf4"/>
    <ellipse cx="70" cy="106" rx="11" ry="7" fill="#065f46"/>
    <path d="M59 118 Q70 127 82 118" stroke="#065f46" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M103 128 L134 112" stroke="#166534" stroke-width="14" stroke-linecap="round"/>
    <path d="M125 116 L154 83" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
