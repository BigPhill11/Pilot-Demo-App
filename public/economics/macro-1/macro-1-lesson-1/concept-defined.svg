<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Green panda teacher showing GDP as total output on a classroom board">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#065f46" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="320" height="220" fill="url(#bg)"/>
  <path d="M0 166 C42 92 111 65 174 77 C236 88 276 124 320 105 L320 220 L0 220 Z" fill="#bbf7d0" opacity="0.42"/>
  <ellipse cx="160" cy="207" rx="118" ry="11" fill="#065f46" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="116" y="28" width="178" height="150" rx="16" fill="#2f8f3f"/>
    <rect x="126" y="39" width="158" height="128" rx="10" fill="#fffbeb"/>
    <text x="205" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#065f46">Total Output</text>
    <line x1="205" y1="76" x2="205" y2="103" stroke="#047857" stroke-width="3"/>
    <line x1="155" y1="103" x2="255" y2="103" stroke="#047857" stroke-width="3" stroke-linecap="round"/>
    <rect x="151" y="103" width="45" height="34" rx="7" fill="#22c55e"/>
    <rect x="215" y="103" width="45" height="34" rx="7" fill="#16a34a"/>
    <text x="173" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff">goods</text>
    <text x="238" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff">services</text>
    <text x="205" y="153" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">made here this year</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="72" cy="157" rx="35" ry="45" fill="url(#fur)"/>
    <circle cx="72" cy="86" r="43" fill="#f8fff3"/>
    <circle cx="44" cy="56" r="19" fill="#166534"/>
    <circle cx="100" cy="56" r="19" fill="#166534"/>
    <ellipse cx="56" cy="86" rx="12" ry="17" fill="#065f46" transform="rotate(12 56 86)"/>
    <ellipse cx="88" cy="86" rx="12" ry="17" fill="#065f46" transform="rotate(-12 88 86)"/>
    <circle cx="56" cy="84" r="5" fill="#f0fdf4"/>
    <circle cx="88" cy="84" r="5" fill="#f0fdf4"/>
    <ellipse cx="72" cy="105" rx="11" ry="7" fill="#065f46"/>
    <path d="M61 117 Q72 126 84 117" stroke="#065f46" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M104 130 L135 112" stroke="#166534" stroke-width="14" stroke-linecap="round"/>
    <path d="M125 116 L150 85" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
    <rect x="36" y="134" width="41" height="44" rx="5" fill="#065f46"/>
