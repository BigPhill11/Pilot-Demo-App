<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Market Intelligence Village map with six learning buildings">
  <title>Market Intelligence Village</title>
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f8f4d"/>
      <stop offset="48%" stop-color="#16743d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="skywash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#bbf7d0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#052e16" flood-opacity="0.26"/>
    </filter>
    <filter id="signShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#052e16" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#ground)"/>
  <rect width="1200" height="260" fill="url(#skywash)"/>
  <rect width="1200" height="750" fill="url(#centerGlow)"/>

  <!-- Forest edge -->
  <g opacity="0.88">
    <g transform="translate(55 116)">
      <rect x="-6" y="34" width="12" height="32" fill="#713f12"/>
      <polygon points="0,-22 31,34 -31,34" fill="#15803d"/>
      <polygon points="0,-42 22,6 -22,6" fill="#22c55e"/>
    </g>
    <g transform="translate(108 142)">
      <rect x="-6" y="32" width="12" height="30" fill="#713f12"/>
      <polygon points="0,-18 28,32 -28,32" fill="#166534"/>
      <polygon points="0,-38 20,4 -20,4" fill="#16a34a"/>
    </g>
    <g transform="translate(1130 118)">
      <rect x="-6" y="34" width="12" height="32" fill="#713f12"/>
      <polygon points="0,-22 31,34 -31,34" fill="#15803d"/>
      <polygon points="0,-42 22,6 -22,6" fill="#22c55e"/>
    </g>
    <g transform="translate(1076 150)">
      <rect x="-6" y="32" width="12" height="30" fill="#713f12"/>
      <polygon points="0,-18 28,32 -28,32" fill="#166534"/>
      <polygon points="0,-38 20,4 -20,4" fill="#16a34a"/>
    </g>
  </g>

  <!-- Main road -->
  <path d="M 148 142 C 292 226 440 184 592 305 C 728 414 870 375 1010 476 C 1080 526 1016 636 882 683"
        fill="none" stroke="#57534e" stroke-width="54" stroke-linecap="round" opacity="0.42"/>
  <path d="M 148 142 C 292 226 440 184 592 305 C 728 414 870 375 1010 476 C 1080 526 1016 636 882 683"
        fill="none" stroke="#d6d3d1" stroke-width="40" stroke-linecap="round" opacity="0.54"/>
  <path d="M 148 142 C 292 226 440 184 592 305 C 728 414 870 375 1010 476 C 1080 526 1016 636 882 683"
        fill="none" stroke="#a8a29e" stroke-width="25" stroke-linecap="round" stroke-dasharray="18 13" opacity="0.28"/>

  <!-- Water and land details -->
  <ellipse cx="598" cy="315" rx="86" ry="45" fill="#0284c7" opacity="0.32"/>
  <ellipse cx="590" cy="304" rx="34" ry="15" fill="#7dd3fc" opacity="0.28"/>
  <g opacity="0.75">
    <circle cx="362" cy="552" r="5" fill="#f59e0b"/>
    <circle cx="394" cy="570" r="4" fill="#bbf7d0"/>
    <circle cx="430" cy="546" r="5" fill="#34d399"/>
    <circle cx="724" cy="552" r="5" fill="#bbf7d0"/>
    <circle cx="754" cy="570" r="4" fill="#34d399"/>
    <circle cx="785" cy="545" r="5" fill="#f59e0b"/>
  </g>
  <g opacity="0.85">
    <g transform="translate(276 640)">
      <rect x="-3" y="-52" width="6" height="52" fill="#4ade80" rx="3"/>
      <rect x="-3" y="-42" width="6" height="4" fill="#16a34a" rx="1"/>
      <rect x="-3" y="-28" width="6" height="4" fill="#16a34a" rx="1"/>
      <rect x="-3" y="-14" width="6" height="4" fill="#16a34a" rx="1"/>
    </g>
    <g transform="translate(910 640)">
      <rect x="-3" y="-52" width="6" height="52" fill="#4ade80" rx="3"/>
      <rect x="-3" y="-42" width="6" height="4" fill="#16a34a" rx="1"/>
      <rect x="-3" y="-28" width="6" height="4" fill="#16a34a" rx="1"/>
      <rect x="-3" y="-14" width="6" height="4" fill="#16a34a" rx="1"/>
    </g>
  </g>

  <!-- Integrated building platforms -->
  <g opacity="0.95">
    <ellipse cx="276" cy="226" rx="118" ry="34" fill="#052e16" opacity="0.18"/>
    <ellipse cx="804" cy="226" rx="118" ry="34" fill="#052e16" opacity="0.18"/>
    <ellipse cx="288" cy="444" rx="112" ry="32" fill="#052e16" opacity="0.18"/>
    <ellipse cx="864" cy="444" rx="112" ry="32" fill="#052e16" opacity="0.18"/>
    <ellipse cx="432" cy="627" rx="112" ry="33" fill="#052e16" opacity="0.18"/>
    <ellipse cx="756" cy="627" rx="112" ry="33" fill="#052e16" opacity="0.18"/>
  </g>

  <!-- Map sign -->
  <g transform="translate(600 418)" filter="url(#signShadow)">
    <rect x="-5" y="24" width="10" height="38" fill="#92400e"/>
    <rect x="-104" y="0" width="208" height="30" fill="#92400e" rx="6"/>
    <rect x="-100" y="4" width="200" height="22" fill="#fef3c7" rx="4"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="800" fill="#065f46">Market Intelligence Village</text>
  </g>
</svg>
