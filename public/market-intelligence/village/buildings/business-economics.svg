<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 100" role="img" aria-label="Business Economics academy building">
  <title>Business Economics Academy</title>
  <defs>
    <linearGradient id="academyRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="academyWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="academyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Ground shadow -->
  <ellipse cx="48" cy="96" rx="34" ry="5" fill="rgba(51,65,85,0.25)"/>
  <!-- Steps -->
  <rect x="22" y="88" width="52" height="5" fill="#334155" rx="1"/>
  <rect x="26" y="83" width="44" height="5" fill="#475569" rx="1"/>
  <!-- Main structure -->
  <g filter="url(#academyShadow)">
    <!-- Pediment -->
    <polygon points="8,38 48,12 88,38" fill="url(#academyRoof)"/>
    <polygon points="14,38 48,16 82,38" fill="#475569" opacity="0.3"/>
    <!-- Columns -->
    <rect x="18" y="38" width="7" height="46" fill="#334155" rx="2"/>
    <rect x="30" y="38" width="7" height="46" fill="#334155" rx="2"/>
    <rect x="59" y="38" width="7" height="46" fill="#334155" rx="2"/>
    <rect x="71" y="38" width="7" height="46" fill="#334155" rx="2"/>
    <!-- Wall -->
    <rect x="14" y="38" width="68" height="46" fill="url(#academyWall)" stroke="#334155" stroke-width="1.5"/>
    <!-- Chart emblem on pediment -->
    <rect x="38" y="22" width="20" height="14" fill="#f0fdf4" rx="2" stroke="#059669" stroke-width="1"/>
    <polyline points="41,32 46,27 51,30 56,24" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Windows -->
    <rect x="22" y="44" width="14" height="12" fill="#bfdbfe" rx="1.5" stroke="#334155" stroke-width="0.75"/>
    <rect x="60" y="44" width="14" height="12" fill="#bfdbfe" rx="1.5" stroke="#334155" stroke-width="0.75"/>
    <line x1="29" y1="44" x2="29" y2="56" stroke="#334155" stroke-width="0.5"/>
    <line x1="22" y1="50" x2="36" y2="50" stroke="#334155" stroke-width="0.5"/>
    <line x1="67" y1="44" x2="67" y2="56" stroke="#334155" stroke-width="0.5"/>
    <line x1="60" y1="50" x2="74" y2="50" stroke="#334155" stroke-width="0.5"/>
    <!-- Door -->
    <rect x="38" y="62" width="20" height="22" fill="#334155" rx="2"/>
    <rect x="40" y="64" width="16" height="18" fill="#bfdbfe" rx="1"/>
    <circle cx="52" cy="73" r="1.5" fill="#f59e0b"/>
  </g>
</svg>
