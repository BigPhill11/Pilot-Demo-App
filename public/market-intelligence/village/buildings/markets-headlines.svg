      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="towerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
