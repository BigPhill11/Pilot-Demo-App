<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 100" role="img" aria-label="Markets and Headlines news tower">
  <title>Markets and Headlines Tower</title>
  <defs>
    <linearGradient id="towerRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="towerWall" x1="0%" y1="0%" x2="100%" y2="100%">
