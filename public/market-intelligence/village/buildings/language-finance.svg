<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 100" role="img" aria-label="Language of Finance library building">
  <title>Language of Finance Library</title>
  <defs>
    <linearGradient id="libRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="libWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="libShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <ellipse cx="48" cy="96" rx="34" ry="5" fill="rgba(76,29,149,0.25)"/>
  <g filter="url(#libShadow)">
    <polygon points="12,32 48,8 84,32" fill="url(#libRoof)"/>
    <rect x="18" y="32" width="60" height="58" fill="url(#libWall)" stroke="#4c1d95" stroke-width="1.5"/>
    <!-- Chimney -->
    <rect x="68" y="14" width="8" height="20" fill="#4c1d95" rx="1"/>
    <rect x="66" y="12" width="12" height="4" fill="#6d28d9" rx="1"/>
    <!-- Book display window -->
    <rect x="26" y="40" width="44" height="28" fill="#ddd6fe" stroke="#4c1d95" stroke-width="1" rx="2"/>
    <rect x="29" y="43" width="5" height="22" fill="#059669" rx="0.5"/>
    <rect x="36" y="43" width="5" height="22" fill="#047857" rx="0.5"/>
    <rect x="43" y="43" width="5" height="22" fill="#0d9488" rx="0.5"/>
    <rect x="50" y="43" width="5" height="22" fill="#065f46" rx="0.5"/>
    <rect x="57" y="43" width="5" height="22" fill="#166534" rx="0.5"/>
    <!-- Awning -->
    <polygon points="16,38 80,38 76,32 20,32" fill="#6d28d9" opacity="0.85"/>
    <!-- Door -->
    <rect x="36" y="72" width="24" height="18" fill="#4c1d95" rx="2"/>
    <rect x="38" y="74" width="9" height="14" fill="#ddd6fe" rx="1"/>
    <rect x="49" y="74" width="9" height="14" fill="#ddd6fe" rx="1"/>
    <!-- Open book sign -->
    <path d="M42 18 Q48 14 54 18 L54 26 Q48 22 42 26 Z" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
    <line x1="48" y1="14" x2="48" y2="26" stroke="#059669" stroke-width="0.75"/>
  </g>
</svg>
