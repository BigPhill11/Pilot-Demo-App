<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 100" role="img" aria-label="Business Foundations workshop building">
  <title>Business Foundations Workshop</title>
  <defs>
    <linearGradient id="workRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="workWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="workShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <ellipse cx="48" cy="96" rx="36" ry="5" fill="rgba(154,52,18,0.25)"/>
  <g filter="url(#workShadow)">
    <polygon points="8,42 48,18 88,42" fill="url(#workRoof)"/>
    <rect x="12" y="42" width="72" height="48" fill="url(#workWall)" stroke="#9a3412" stroke-width="1.5"/>
    <!-- Chimney with smoke -->
    <rect x="68" y="22" width="10" height="22" fill="#9a3412" rx="1"/>
    <ellipse cx="73" cy="18" rx="4" ry="3" fill="#d1d5db" opacity="0.6"/>
    <ellipse cx="76" cy="12" rx="3" ry="2" fill="#d1d5db" opacity="0.45"/>
    <ellipse cx="79" cy="7" rx="2" ry="1.5" fill="#d1d5db" opacity="0.3"/>
    <!-- Gear window -->
    <rect x="18" y="50" width="28" height="22" fill="#fed7aa" stroke="#9a3412" stroke-width="1"/>
    <circle cx="32" cy="61" r="7" fill="none" stroke="#c2410c" stroke-width="1.5"/>
    <circle cx="32" cy="61" r="3" fill="#c2410c"/>
    <g stroke="#c2410c" stroke-width="1.5">
      <line x1="32" y1="52" x2="32" y2="54"/>
      <line x1="32" y1="68" x2="32" y2="70"/>
      <line x1="23" y1="61" x2="25" y2="61"/>
      <line x1="39" y1="61" x2="41" y2="61"/>
    </g>
    <!-- Double door -->
    <rect x="54" y="58" width="22" height="32" fill="#9a3412" rx="2"/>
    <rect x="55" y="60" width="9" height="28" fill="#fed7aa" rx="1"/>
    <rect x="66" y="60" width="9" height="28" fill="#fed7aa" rx="1"/>
    <!-- Toolbox -->
    <rect x="22" y="78" width="14" height="8" fill="#c2410c" rx="1"/>
    <rect x="26" y="76" width="6" height="3" fill="#9a3412" rx="1"/>
  </g>
</svg>
