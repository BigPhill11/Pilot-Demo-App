<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 100" role="img" aria-label="Company Tinder market bazaar">
  <title>Company Tinder Bazaar</title>
  <defs>
    <linearGradient id="bazaarRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="bazaarWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <filter id="bazaarShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <ellipse cx="48" cy="96" rx="38" ry="5" fill="rgba(131,24,67,0.25)"/>
  <g filter="url(#bazaarShadow)">
    <polygon points="4,42 48,22 92,42" fill="url(#bazaarRoof)"/>
    <polygon points="4,42 22,42 48,22" fill="#831843" opacity="0.5"/>
    <polygon points="22,42 40,42 48,22" fill="#db2777" opacity="0.4"/>
    <polygon points="40,42 58,42 48,22" fill="#831843" opacity="0.5"/>
    <polygon points="58,42 76,42 48,22" fill="#db2777" opacity="0.4"/>
    <polygon points="76,42 92,42 48,22" fill="#831843" opacity="0.5"/>
    <line x1="22" y1="22" x2="22" y2="10" stroke="#831843" stroke-width="1.5"/>
    <polygon points="22,10 32,14 22,18" fill="#f472b6"/>
    <line x1="48" y1="22" x2="48" y2="8" stroke="#831843" stroke-width="1.5"/>
    <polygon points="48,8 60,13 48,18" fill="#ec4899"/>
    <line x1="74" y1="22" x2="74" y2="10" stroke="#831843" stroke-width="1.5"/>
    <polygon points="74,10 84,14 74,18" fill="#f472b6"/>
    <rect x="8" y="42" width="80" height="48" fill="url(#bazaarWall)" stroke="#831843" stroke-width="1.5"/>
    <!-- Left stall - swipe card -->
    <rect x="14" y="50" width="28" height="22" fill="#fbcfe8" stroke="#831843" stroke-width="1" rx="2"/>
    <path d="M28 58 C28 54 32 52 28 50 C24 52 28 54 28 58 Z" fill="#db2777"/>
    <!-- Right stall - lightbulb idea -->
    <rect x="54" y="50" width="28" height="22" fill="#fbcfe8" stroke="#831843" stroke-width="1" rx="2"/>
    <ellipse cx="68" cy="58" rx="5" ry="6" fill="#f59e0b"/>
    <rect x="66" y="64" width="4" height="3" fill="#64748b" rx="0.5"/>
    <!-- Center door -->
    <rect x="38" y="62" width="20" height="28" fill="#831843" rx="2"/>
    <path d="M38,62 Q48,54 58,62" fill="#db2777"/>
    <rect x="40" y="66" width="16" height="22" fill="#fce7f3" rx="1"/>
  </g>
</svg>
